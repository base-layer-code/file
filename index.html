<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📁 FILE MANAGER V3</title>
    <style>
        :root {
            --bg: #000; --panel: #1c1c1e; --accent: #0a84ff;
            --success: #32d74b; --text: #fff; --border: #38383a;
        }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            padding: 20px; background: #111; border-bottom: 1px solid var(--border);
            padding-top: calc(20px + env(safe-area-inset-top));
        }
        .info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { font-size: 0.9rem; margin: 0; color: var(--accent); }
        #status { font-size: 0.75rem; font-weight: bold; padding: 2px 8px; border-radius: 5px; background: #333; }

        .toolbar { display: flex; gap: 8px; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; color: white; font-size: 0.85rem;
        }
        .btn-save { background: var(--success); }
        .btn-search { background: var(--accent); }
        .btn-share { background: #bf5af2; }

        main { display: flex; flex-grow: 1; flex-direction: column; padding: 15px; gap: 10px; }
        .input-box { background: var(--panel); padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        input { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.1rem; outline: none; }
        textarea {
            flex: 1; background: var(--panel); color: #efefef; border: 1px solid var(--border);
            border-radius: 10px; padding: 15px; font-family: 'Menlo', monospace; font-size: 1rem; resize: none; outline: none;
        }

        #undo-banner {
            position: fixed; bottom: -100px; left: 20px; right: 20px;
            background: #333; padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 9999; transition: 0.4s;
        }
        #undo-banner.show { bottom: 30px; }
    </style>
</head>
<body>

<header>
    <div class="info">
        <h1>📁 FILE MANAGER V3</h1>
        <div id="status">READY</div>
    </div>
    <div class="toolbar">
        <button class="btn-save" onclick="handleSave()">💾 保存</button>
        <button class="btn-search" onclick="handleSearch()">🔍 検索</button>
        <button class="btn-share" onclick="handleShare()">🔗 共有URL</button>
    </div>
</header>

<main>
    <div class="input-box"><input type="text" id="filename" placeholder="名前..." spellcheck="false"></div>
    <textarea id="content" placeholder="内容..." spellcheck="false"></textarea>
</main>

<div id="undo-banner">
    <span>保存しました <b id="timer">5</b>s</span>
    <button style="background:var(--accent); width:auto;" onclick="undoAction()">↩️ 戻す</button>
</div>

<script>
    const nameIn = document.getElementById('filename');
    const bodyIn = document.getElementById('content');
    const status = document.getElementById('status');
    let backup = { n: '', b: '' };
    let undoT = null;

    // --- 1. 裏方担当(sw.js)登録 ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.error(e));
    }

    // --- 2. 共有URL解析 (日本語に強い方式) ---
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const shareData = params.get('share');

        if (shareData) {
            try {
                // 安全にデコードする新ロジック
                const decodedData = decodeURIComponent(escape(atob(shareData)));
                const obj = JSON.parse(decodedData);
                
                if (obj.n && obj.b) {
                    nameIn.value = obj.n;
                    bodyIn.value = obj.b;
                    localStorage.setItem('DB_FILE_' + obj.n, obj.b);
                    updateStatus("📥 共有成功！", "#32d74b");
                    // URLをきれいにする
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } catch (e) {
                updateStatus("❌ エラー: " + e.message, "#ff453a");
                console.error(e);
            }
        } else {
            nameIn.value = localStorage.getItem('DRAFT_N') || '';
            bodyIn.value = localStorage.getItem('DRAFT_B') || '';
        }
    };

    function updateStatus(txt, color) {
        status.innerText = txt;
        status.style.color = color || "#888";
    }

    function auto() {
        localStorage.setItem('DRAFT_N', nameIn.value);
        localStorage.setItem('DRAFT_B', bodyIn.value);
    }
    nameIn.addEventListener('input', auto);
    bodyIn.addEventListener('input', auto);

    function handleSave() {
        const n = nameIn.value.trim();
        const b = bodyIn.value;
        if (!n) return alert("名前を入れて！");
        localStorage.setItem('DB_FILE_' + n, b);
        backup = { n, b };
        nameIn.value = ""; bodyIn.value = ""; auto();
        showUndo();
        updateStatus("✅ 保存完了", "#32d74b");
    }

    function handleSearch() {
        const n = nameIn.value.trim();
        const found = localStorage.getItem('DB_FILE_' + n);
        if (found !== null) {
            bodyIn.value = found; auto();
            updateStatus("🔍 読込成功", "#0a84ff");
        } else {
            alert("「" + n + "」はないよ");
        }
    }

    // --- 3. 共有URL作成 (日本語に強い方式) ---
    function handleShare() {
        const n = nameIn.value.trim();
        const b = bodyIn.value;
        if (!n || !b) return alert("空っぽだよ");
        
        try {
            const data = JSON.stringify({ n, b });
            // 日本語を壊さないエンコード
            const encoded = btoa(unescape(encodeURIComponent(data)));
            const url = window.location.origin + window.location.pathname + "?share=" + encoded;
            
            navigator.clipboard.writeText(url).then(() => {
                alert("URLをコピーしたよ！");
                updateStatus("🔗 URLコピー済", "#bf5af2");
            });
        } catch (e) {
            alert("共有に失敗: " + e.message);
        }
    }

    function showUndo() {
        const banner = document.getElementById('undo-banner');
        const timer = document.getElementById('timer');
        let left = 5;
        banner.classList.add('show');
        timer.innerText = left;
        clearInterval(undoT);
        undoT = setInterval(() => {
            left--; timer.innerText = left;
            if (left <= 0) { banner.classList.remove('show'); clearInterval(undoT); }
        }, 1000);
    }

    function undoAction() {
        nameIn.value = backup.n; bodyIn.value = backup.b; auto();
        document.getElementById('undo-banner').classList.remove('show');
        clearInterval(undoT);
    }
</script>
</body>
</html>
